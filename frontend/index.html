<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc RAG Assistant</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.4rem; }
    textarea, input { width: 100%; box-sizing: border-box; padding: .6rem;
                      font: inherit; border-radius: 8px; border: 1px solid #8888; }
    button { padding: .55rem 1rem; font: inherit; border-radius: 8px;
             border: 0; background: #2563eb; color: #fff; cursor: pointer; }
    button:disabled { opacity: .5; cursor: progress; }
    .card { border: 1px solid #8884; border-radius: 12px; padding: 1rem; margin: 1rem 0; }
    .answer { white-space: pre-wrap; }
    .cite { font-size: .85rem; color: #666; border-left: 3px solid #2563eb;
            padding-left: .6rem; margin: .5rem 0; }
    .row { display: flex; gap: .5rem; align-items: center; }
    small { color: #888; }
  </style>
</head>
<body>
  <h1>Doc RAG Assistant</h1>
  <p><small>Ask questions grounded in your indexed documents. Answers cite the
    source chunks they used.</small></p>

  <div class="card">
    <h3>1. Add a document</h3>
    <input id="source" placeholder="source name, e.g. policy.md" />
    <textarea id="text" rows="4" placeholder="paste document text..."></textarea>
    <div class="row" style="margin-top:.5rem">
      <button id="ingestBtn">Ingest</button>
      <span id="ingestStatus"></span>
    </div>
  </div>

  <div class="card">
    <h3>2. Ask a question</h3>
    <div class="row">
      <input id="question" placeholder="What is the refund window?" />
      <button id="askBtn">Ask</button>
    </div>
    <div id="answer" class="answer"></div>
    <div id="citations"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function post(path, body) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      return res.json();
    }

    $("ingestBtn").onclick = async () => {
      const btn = $("ingestBtn");
      btn.disabled = true; $("ingestStatus").textContent = "ingesting...";
      try {
        const r = await post("/ingest", { source: $("source").value || "untitled", text: $("text").value });
        $("ingestStatus").textContent = `added ${r.chunks_added} chunks (index: ${r.total_chunks})`;
        $("text").value = "";
      } catch (e) { $("ingestStatus").textContent = "error: " + e.message; }
      finally { btn.disabled = false; }
    };

    $("askBtn").onclick = async () => {
      const btn = $("askBtn");
      btn.disabled = true; $("answer").textContent = "thinking..."; $("citations").innerHTML = "";
      try {
        const r = await post("/query", { question: $("question").value, top_k: 4 });
        $("answer").textContent = r.answer;
        $("citations").innerHTML = r.citations.map(
          (c, i) => `<div class="cite">[${i + 1}] ${c.source} (score ${c.score})<br>${c.preview}…</div>`
        ).join("");
      } catch (e) { $("answer").textContent = "error: " + e.message; }
      finally { btn.disabled = false; }
    };
  </script>
</body>
</html>
